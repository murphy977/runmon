# nginx 反代示例:relay 挂在子域名下,与已有站点共存,复用 443。
# 1) DNS 加 A 记录: mon.example.com → 服务器 IP
# 2) certbot --nginx -d mon.example.com 签证书
# 3) 此文件放 /etc/nginx/sites-available/ 并软链到 sites-enabled/,nginx -t && systemctl reload nginx
server {
    listen 443 ssl;
    server_name mon.example.com;

    # ssl_certificate / ssl_certificate_key 由 certbot 自动填充

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        # WebSocket upgrade(/ws/agent 与 /ws/app 必需)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # WSS 长连,心跳间隔 10s,给足余量
        proxy_send_timeout 300s;
    }
}
